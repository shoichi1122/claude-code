name: Deploy schedule app to GitHub Pages

on:
  push:
    branches: [claude/daily-schedule-app-ga3o91]
    paths:
      - 'daily-schedule-app/**'
      - '.github/workflows/deploy-schedule-app.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: daily-schedule-app
      - id: deployment
        uses: actions/deploy-pages@v4
